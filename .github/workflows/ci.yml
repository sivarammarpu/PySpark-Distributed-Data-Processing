name: CI — PySpark Distributed Data Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 11 (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Verify Java installation
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyspark==3.5.0 pytest pytest-cov faker python-dotenv

      - name: Verify PySpark installation
        run: python3 -c "import pyspark; print('PySpark version:', pyspark.__version__)"

      - name: Generate sample data
        run: python3 data/generate_sample_data.py

      - name: Run Unit Tests
        run: |
          python3 -m pytest tests/ \
            -v \
            --tb=long \
            --no-header \
            -p no:cacheprovider

      - name: Run coverage (informational only — does not fail build)
        run: |
          python3 -m pytest tests/ \
            --cov=src \
            --cov-report=html \
            --cov-report=term-missing \
            -q || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
